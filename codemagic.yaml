# Codemagic CI/CD for miraculturee iOS (Capacitor)
#
# Apple Developer account (reused from wavdrop):
#   Team ID: GMQY9LD9C2 (DOREEN M YIANACOPOLUS)
#   Distribution cert already exists in this team — the same Apple
#   Distribution cert signs both com.wavdrop.app and com.miraculturee.app.
#
# Workflows:
#   ios-release  — full App Store distribution build → TestFlight
#   ios-adhoc    — ad-hoc signed .ipa for internal device testing
#   web-build    — web-only smoke test (no mac needed) for PRs
#
# Auth model: Codemagic "App Store Connect API key" integration.
#   1. In Codemagic UI: Team Settings → Integrations → App Store Connect API
#      → add the same integration wavdrop uses (or create a new one
#      with a .p8 generated at https://appstoreconnect.apple.com/access/api).
#   2. Name it (default below: `miraculturee_asc`) and reference it in the
#      `integrations` block of each workflow below.
#   3. On first run, Codemagic auto-fetches / generates the distribution
#      cert + provisioning profile for com.miraculturee.app — exactly the
#      flow that worked for wavdrop (see wavdrop_13_artifacts log).
#
# Prerequisite on App Store Connect (one-time, web only — not in CI):
#   - Register bundle ID `com.miraculturee.app` under team GMQY9LD9C2
#     https://developer.apple.com/account/resources/identifiers/list
#   - Create the App record in App Store Connect:
#     https://appstoreconnect.apple.com/apps → "+" → New App
#     → capture the numeric Apple ID and paste it below as APP_STORE_APPLE_ID.
#
# Non-signing secrets (Codemagic env group `miraculturee_env`):
#     - VITE_API_URL              (e.g. https://miracultureeapi-production-cca9.up.railway.app)
#     - VITE_STRIPE_PUBLISHABLE_KEY
#     - VITE_HCAPTCHA_SITE_KEY
#     - VITE_SOCKET_URL

definitions:
  scripts:
    - &install_pnpm
      name: Install pnpm
      script: |
        npm install -g pnpm@9.15.0
        pnpm --version

    - &pnpm_install
      name: Install dependencies
      script: |
        pnpm install --frozen-lockfile

    - &build_web
      name: Build @miraculturee/shared + @miraculturee/web
      script: |
        pnpm --filter @miraculturee/shared build
        pnpm --filter @miraculturee/web build

    - &sync_capacitor
      name: Copy web dist → iOS and cap sync
      script: |
        cd apps/ios
        rm -rf www
        cp -r ../web/dist www
        pnpm exec cap sync ios

    - &cocoapods_install
      name: Install CocoaPods dependencies
      script: |
        cd apps/ios/ios/App
        pod install --repo-update

  cache:
    - &pnpm_cache
      cache_paths:
        - $HOME/.pnpm-store
        - node_modules
        - apps/web/node_modules
        - apps/api/node_modules
        - apps/ios/node_modules
        - packages/shared/node_modules

    - &pods_cache
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.cocoapods
        - apps/ios/ios/App/Pods

workflows:
  # ---------------------------------------------------------------
  # iOS Release → TestFlight
  # ---------------------------------------------------------------
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 90
    instance_type: mac_mini_m2
    # Signing uses the team-level Codemagic integration named 'wavdrop'
    # (Key 22TM26BJ8D, Issuer 0c8293e2-..., Apple team GMQY9LD9C2).
    # The integration name is a handle; the same .p8 signs miraculturee,
    # wavdrop, and any other app under team GMQY9LD9C2. No per-app env
    # vars or fetch-signing-files script needed — Codemagic handles
    # keychain init, cert fetch/create, and profile setup automatically.
    integrations:
      app_store_connect: wavdrop
    environment:
      # Reference the app-level env var group that holds CERT_KEY_B64
      # (base64-encoded RSA 2048 PEM for the persistent distribution
      # cert). Without this groups declaration, Codemagic does NOT
      # inject variables from the ios_signing group into the build
      # environment — even if they're set on the app.
      groups:
        - ios_signing
      vars:
        BUNDLE_ID: com.miraculturee.app
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6762042598"  # App Store Connect numeric ID for com.miraculturee.app
        # Force bundler 2.7.2 for the whole build. Codemagic's Ruby
        # 3.4.7 ships with bundler 4.0.1 which breaks both fastlane
        # (requires < 3.0) and Capacitor's `cap sync` internal
        # `bundle exec pod install`. See 'Install bundler 2.7.2' step.
        BUNDLER_VERSION: "2.7.2"
      node: 20.11.1
      xcode: latest
      cocoapods: default
    cache:
      <<: *pnpm_cache
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "ios-v*"
          include: true
    scripts:
      - name: Install bundler 2.7.2 (compat with fastlane + cap sync)
        script: |
          # MUST run before any 'bundle' or 'cap sync' invocation.
          # Codemagic's Ruby 3.4.7 ships with bundler 4.0.1 which is
          # incompatible with fastlane (< 3.0) and with Capacitor's
          # auto 'bundle exec pod install' path. Installing 2.7.2 and
          # exporting BUNDLER_VERSION=2.7.2 (see workflow env vars)
          # forces every subsequent `bundle` call to use 2.7.2.
          gem install bundler:2.7.2 --no-document
          bundle _2.7.2_ --version
      - *install_pnpm
      - *pnpm_install
      - *build_web
      - *sync_capacitor
      - name: Install CocoaPods dependencies
        script: |
          cd apps/ios/ios/App
          pod install --repo-update
      - name: Fetch or create signing files
        script: |
          set -e
          cd apps/ios/ios/App
          # PERSISTENT KEY STRATEGY — see hehe-app/codemagic.yaml for
          # the full rationale. Short version: CERT_KEY_B64 is a
          # base64-encoded RSA private key on the Codemagic app env.
          # Decoded here, passed to fetch-signing-files. First build
          # creates a distribution cert matching this key; subsequent
          # builds find and reuse it. No cert churn.
          unset CERTIFICATE_PRIVATE_KEY
          if [ -z "${CERT_KEY_B64:-}" ]; then
            echo "ERROR: CERT_KEY_B64 env var is empty or unset" >&2
            exit 2
          fi
          echo "$CERT_KEY_B64" | base64 -d > /tmp/cert_key.pem
          CERT_KEY_CONTENT=$(cat /tmp/cert_key.pem)
          if ! grep -q "BEGIN PRIVATE KEY" /tmp/cert_key.pem; then
            echo "ERROR: decoded key is not a valid PEM" >&2
            exit 2
          fi

          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "$CERT_KEY_CONTENT"
          keychain add-certificates
          xcode-project use-profiles \
            --project App.xcodeproj \
            --warn-only \
            --verbose

          # CRITICAL: Xcode 26+ codesign needs the CM keychain as the
          # default keychain AND the partition list set to allow codesign
          # non-interactive access. Without this fix, archive fails with
          # errSecInternalComponent on the first framework codesign call.
          # Confirmed by SSH debug on build 69ded90529f0928c5e6c093b
          # (MiraCulture, 2026-04-14): `keychain add-certificates` does
          # not set the default keychain, so codesign looks in
          # login.keychain-db (where the cert isn't) and fails.
          KC_PATH=$(security list-keychains -d user | grep codemagic-cli-tools | head -1 | tr -d '" ')
          if [ -n "$KC_PATH" ]; then
            security list-keychains -d user -s "$KC_PATH" /Users/builder/Library/Keychains/login.keychain-db
            security default-keychain -s "$KC_PATH"
            security unlock-keychain -p "" "$KC_PATH"
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KC_PATH" 2>/dev/null || true
            # CRITICAL: Export this so gym/xcodebuild appends it to all
            # codesign invocations. Default keychain alone is NOT enough
            # — xcodebuild's internal codesign calls ignore the default
            # keychain and need the --keychain flag explicitly. Confirmed
            # by SSH debug: archive succeeded only with this flag set.
            export OTHER_CODE_SIGN_FLAGS="--keychain $KC_PATH"
            echo "CM keychain set as default + OTHER_CODE_SIGN_FLAGS: $KC_PATH"
          fi

          # Scrub the decoded key from disk.
          shred -u /tmp/cert_key.pem 2>/dev/null || rm -f /tmp/cert_key.pem
      - name: Set build number
        script: |
          # Timestamp-based build number. Prevents the
          # 'bundle version must be higher than previously uploaded'
          # 409 error that hits when get-latest-testflight-build-number
          # returns 0 because an earlier build is still processing.
          # Happened on hehe-app on 2026-04-11. Applying preemptively.
          cd apps/ios/ios/App
          NEW_BUILD_NUMBER=$(date +%s)
          agvtool new-version -all "$NEW_BUILD_NUMBER"
          echo "Build number set to $NEW_BUILD_NUMBER (unix timestamp)"
      # Build + upload via fastlane. Replaces the prior raw xcodebuild
      # archive + exportArchive + Codemagic publishing block. User
      # directive 2026-04-11: "always push via fastlane". Fastfile lives
      # at apps/ios/ios/App/fastlane/Fastfile. Signing state is already
      # wired by the 'Fetch or create signing files' step above — gym
      # inherits the keychain + profiles.
      - name: Install Ruby gems for fastlane
        script: |
          cd apps/ios/ios/App
          bundle config set --local path 'vendor/bundle'
          bundle install
      - name: Build archive via fastlane (no upload)
        script: |
          cd apps/ios/ios/App
          bundle exec fastlane beta

      - name: Upload to TestFlight via xcrun altool
        script: |
          # Fastlane's upload actions fail on Ruby 3.4 + fastlane 2.232
          # with OpenSSL::PKey::EC 'invalid curve name' (ES256 bug).
          # Using xcrun altool bypasses Ruby's broken EC handling —
          # altool is Apple's own Swift binary. It accepts the same
          # App Store Connect API credentials that Codemagic injects.
          set -e
          IPA=$(ls apps/ios/ios/App/*.ipa | head -1)
          if [ -z "$IPA" ]; then
            echo "ERROR: no IPA found in apps/ios/ios/App/" >&2
            exit 1
          fi
          # xcrun altool reads API key from ~/.appstoreconnect/private_keys/AuthKey_<KEY_ID>.p8
          # Codemagic writes the key there automatically when the
          # app_store_connect integration is configured.
          echo "Uploading $IPA to TestFlight..."
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --output-format json
          echo "Upload complete."

    artifacts:
      - apps/ios/ios/App/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM.zip
    # No 'publishing:' block — fastlane handles TestFlight upload
    # inside the 'Build + upload via fastlane beta' script step above.
    # Codemagic's build page will show 'Publishing: skipped', which is
    # correct and intended: the upload already happened.

  # ---------------------------------------------------------------
  # iOS Sideload — unsigned IPA, no ASC login required.
  # Produces a .ipa you can install on a physical iPhone via
  # Sideloadly / AltStore (which re-signs with your free Apple ID).
  # Mirrors the hehe-app "ios-sideload" workflow that's already
  # working in production.
  # ---------------------------------------------------------------
  ios-sideload:
    name: iOS Sideload (unsigned)
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: com.miraculturee.app
        XCODE_SCHEME: "App"
      node: 20.11.1
      xcode: latest
      cocoapods: default
    cache:
      <<: *pnpm_cache
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "ios/*"
          include: true
    scripts:
      - *install_pnpm
      - *pnpm_install
      - *build_web
      - *sync_capacitor
      - name: Install CocoaPods dependencies
        script: |
          # Capacitor 6 plugins still ship as CocoaPods pods, and the
          # project.pbxproj that `cap add ios` generated on Windows is
          # pure CocoaPods (6 [CP] script phases, 4 Pods_App framework
          # links, 0 SPM refs). We must `pod install` before xcodebuild
          # can find the Capacitor module.
          cd apps/ios/ios/App
          pod install --repo-update
      - name: Build unsigned archive
        script: |
          cd apps/ios/ios/App
          # Use .xcworkspace (not .xcodeproj) so xcodebuild can see
          # the Pods project that CocoaPods just generated.
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Export unsigned IPA for sideloading
        script: |
          cd $CM_BUILD_DIR/build/App.xcarchive/Products/Applications
          mkdir -p $CM_BUILD_DIR/build/ios/ipa
          mkdir Payload
          cp -r *.app Payload/
          zip -r $CM_BUILD_DIR/build/ios/ipa/miraculturee.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa

  # ---------------------------------------------------------------
  # Web-only smoke build — runs on every PR, no mac required.
  # Verifies the web build still succeeds and the dist can be
  # copied into the iOS wrapper. Catches breakages early.
  # ---------------------------------------------------------------
  web-build:
    name: Web Build (smoke)
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      groups:
        - miraculturee_env
      node: 20.11.1
    cache:
      <<: *pnpm_cache
    triggering:
      events:
        - pull_request
    scripts:
      - *install_pnpm
      - *pnpm_install
      - *build_web
      - name: Simulate iOS wrapper copy step
        script: |
          mkdir -p apps/ios/www
          cp -r apps/web/dist/* apps/ios/www/
          ls -lah apps/ios/www | head -20
    artifacts:
      - apps/web/dist/**
