# Codemagic CI/CD for miraculturee iOS (Capacitor)
#
# Apple Developer account (reused from wavdrop):
#   Team ID: GMQY9LD9C2 (DOREEN M YIANACOPOLUS)
#   Distribution cert already exists in this team — the same Apple
#   Distribution cert signs both com.wavdrop.app and com.miraculturee.app.
#
# Workflows:
#   ios-release  — full App Store distribution build → TestFlight
#   ios-adhoc    — ad-hoc signed .ipa for internal device testing
#   web-build    — web-only smoke test (no mac needed) for PRs
#
# Auth model: Codemagic "App Store Connect API key" integration.
#   1. In Codemagic UI: Team Settings → Integrations → App Store Connect API
#      → add the same integration wavdrop uses (or create a new one
#      with a .p8 generated at https://appstoreconnect.apple.com/access/api).
#   2. Name it (default below: `miraculturee_asc`) and reference it in the
#      `integrations` block of each workflow below.
#   3. On first run, Codemagic auto-fetches / generates the distribution
#      cert + provisioning profile for com.miraculturee.app — exactly the
#      flow that worked for wavdrop (see wavdrop_13_artifacts log).
#
# Prerequisite on App Store Connect (one-time, web only — not in CI):
#   - Register bundle ID `com.miraculturee.app` under team GMQY9LD9C2
#     https://developer.apple.com/account/resources/identifiers/list
#   - Create the App record in App Store Connect:
#     https://appstoreconnect.apple.com/apps → "+" → New App
#     → capture the numeric Apple ID and paste it below as APP_STORE_APPLE_ID.
#
# Non-signing secrets (Codemagic env group `miraculturee_env`):
#     - VITE_API_URL              (e.g. https://miracultureeapi-production-cca9.up.railway.app)
#     - VITE_STRIPE_PUBLISHABLE_KEY
#     - VITE_HCAPTCHA_SITE_KEY
#     - VITE_SOCKET_URL

definitions:
  scripts:
    - &install_pnpm
      name: Install pnpm
      script: |
        npm install -g pnpm@9.15.0
        pnpm --version

    - &pnpm_install
      name: Install dependencies
      script: |
        pnpm install --frozen-lockfile

    - &build_web
      name: Build @miraculturee/shared + @miraculturee/web
      script: |
        pnpm --filter @miraculturee/shared build
        pnpm --filter @miraculturee/web build

    - &sync_capacitor
      name: Copy web dist → iOS and cap sync
      script: |
        cd apps/ios
        rm -rf www
        cp -r ../web/dist www
        pnpm exec cap sync ios

    - &cocoapods_install
      name: Install CocoaPods dependencies
      script: |
        cd apps/ios/ios/App
        pod install --repo-update

  cache:
    - &pnpm_cache
      cache_paths:
        - $HOME/.pnpm-store
        - node_modules
        - apps/web/node_modules
        - apps/api/node_modules
        - apps/ios/node_modules
        - packages/shared/node_modules

    - &pods_cache
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.cocoapods
        - apps/ios/ios/App/Pods

workflows:
  # ---------------------------------------------------------------
  # iOS Release → TestFlight
  # ---------------------------------------------------------------
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      # Signing creds live as encrypted app-level env vars on the
      # Codemagic miraculturee app (id 69d9ff6d4bc2d3ca57ed1615):
      #   APP_STORE_CONNECT_KEY_IDENTIFIER  = 22TM26BJ8D
      #   APP_STORE_CONNECT_ISSUER_ID       = 0c8293e2-e9ff-4a0e-820e-83cc3c2dd480
      #   APP_STORE_CONNECT_PRIVATE_KEY     = <.p8 contents>
      # (all marked secure) — these are auto-injected into every build.
      vars:
        BUNDLE_ID: com.miraculturee.app
        XCODE_PROJECT: "apps/ios/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        DEVELOPMENT_TEAM: GMQY9LD9C2  # Shared with wavdrop + hehe-app
        APP_STORE_APPLE_ID: "0000000000" # TODO: replace with numeric ASC ID after creating the App record in the web UI
      node: 20.11.1
      xcode: latest
      cocoapods: default
    cache:
      <<: *pnpm_cache
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "ios-v*"
          include: true
    scripts:
      - *install_pnpm
      - *pnpm_install
      - *build_web
      - *sync_capacitor
      - name: Set up code signing (reuse persistent RSA key from env)
        script: |
          set -e
          # We have a persistent 2048-bit RSA private key stored as
          # CERTIFICATE_PRIVATE_KEY (extracted from mira_culture.p12 on
          # the dev machine, uploaded once via Codemagic REST API).
          # Using a stable key means the distribution cert created on
          # the first build is reused on every subsequent build — we
          # never hit Apple's 3-distribution-certs-per-team limit.
          keychain initialize

          # Fetch (or create on first run) signing files for the
          # bundle id using our persistent private key. The
          # app-store-connect CLI reads APP_STORE_CONNECT_KEY_IDENTIFIER,
          # APP_STORE_CONNECT_ISSUER_ID, and APP_STORE_CONNECT_PRIVATE_KEY
          # from env automatically.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY"

          keychain add-certificates
          xcode-project use-profiles
      - name: Set build number
        script: |
          cd apps/ios/ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          agvtool new-version -all $(($LATEST + 1))
      - name: Build .ipa for App Store
        script: |
          cd apps/ios/ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme "$XCODE_SCHEME" \
            --config Release
    artifacts:
      - apps/ios/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM.zip
    publishing:
      app_store_connect:
        # Uses the same APP_STORE_CONNECT_* env vars for TestFlight upload
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  # ---------------------------------------------------------------
  # iOS Sideload — unsigned IPA, no ASC login required.
  # Produces a .ipa you can install on a physical iPhone via
  # Sideloadly / AltStore (which re-signs with your free Apple ID).
  # Mirrors the hehe-app "ios-sideload" workflow that's already
  # working in production.
  # ---------------------------------------------------------------
  ios-sideload:
    name: iOS Sideload (unsigned)
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: com.miraculturee.app
        XCODE_SCHEME: "App"
      node: 20.11.1
      xcode: latest
      cocoapods: default
    cache:
      <<: *pnpm_cache
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "ios/*"
          include: true
    scripts:
      - *install_pnpm
      - *pnpm_install
      - *build_web
      - *sync_capacitor
      - name: Install CocoaPods dependencies
        script: |
          # Capacitor 6 plugins still ship as CocoaPods pods, and the
          # project.pbxproj that `cap add ios` generated on Windows is
          # pure CocoaPods (6 [CP] script phases, 4 Pods_App framework
          # links, 0 SPM refs). We must `pod install` before xcodebuild
          # can find the Capacitor module.
          cd apps/ios/ios/App
          pod install --repo-update
      - name: Build unsigned archive
        script: |
          cd apps/ios/ios/App
          # Use .xcworkspace (not .xcodeproj) so xcodebuild can see
          # the Pods project that CocoaPods just generated.
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Export unsigned IPA for sideloading
        script: |
          cd $CM_BUILD_DIR/build/App.xcarchive/Products/Applications
          mkdir -p $CM_BUILD_DIR/build/ios/ipa
          mkdir Payload
          cp -r *.app Payload/
          zip -r $CM_BUILD_DIR/build/ios/ipa/miraculturee.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa

  # ---------------------------------------------------------------
  # Web-only smoke build — runs on every PR, no mac required.
  # Verifies the web build still succeeds and the dist can be
  # copied into the iOS wrapper. Catches breakages early.
  # ---------------------------------------------------------------
  web-build:
    name: Web Build (smoke)
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      groups:
        - miraculturee_env
      node: 20.11.1
    cache:
      <<: *pnpm_cache
    triggering:
      events:
        - pull_request
    scripts:
      - *install_pnpm
      - *pnpm_install
      - *build_web
      - name: Simulate iOS wrapper copy step
        script: |
          mkdir -p apps/ios/www
          cp -r apps/web/dist/* apps/ios/www/
          ls -lah apps/ios/www | head -20
    artifacts:
      - apps/web/dist/**
