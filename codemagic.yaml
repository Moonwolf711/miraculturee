# Codemagic CI/CD for miraculturee iOS (Capacitor)
#
# Apple Developer account (reused from wavdrop):
#   Team ID: GMQY9LD9C2 (DOREEN M YIANACOPOLUS)
#   Distribution cert already exists in this team — the same Apple
#   Distribution cert signs both com.wavdrop.app and com.miraculturee.app.
#
# Workflows:
#   ios-release  — full App Store distribution build → TestFlight
#   ios-adhoc    — ad-hoc signed .ipa for internal device testing
#   web-build    — web-only smoke test (no mac needed) for PRs
#
# Auth model: Codemagic "App Store Connect API key" integration.
#   1. In Codemagic UI: Team Settings → Integrations → App Store Connect API
#      → add the same integration wavdrop uses (or create a new one
#      with a .p8 generated at https://appstoreconnect.apple.com/access/api).
#   2. Name it (default below: `miraculturee_asc`) and reference it in the
#      `integrations` block of each workflow below.
#   3. On first run, Codemagic auto-fetches / generates the distribution
#      cert + provisioning profile for com.miraculturee.app — exactly the
#      flow that worked for wavdrop (see wavdrop_13_artifacts log).
#
# Prerequisite on App Store Connect (one-time, web only — not in CI):
#   - Register bundle ID `com.miraculturee.app` under team GMQY9LD9C2
#     https://developer.apple.com/account/resources/identifiers/list
#   - Create the App record in App Store Connect:
#     https://appstoreconnect.apple.com/apps → "+" → New App
#     → capture the numeric Apple ID and paste it below as APP_STORE_APPLE_ID.
#
# Non-signing secrets (Codemagic env group `miraculturee_env`):
#     - VITE_API_URL              (e.g. https://miracultureeapi-production-cca9.up.railway.app)
#     - VITE_STRIPE_PUBLISHABLE_KEY
#     - VITE_HCAPTCHA_SITE_KEY
#     - VITE_SOCKET_URL

definitions:
  scripts:
    - &install_pnpm
      name: Install pnpm
      script: |
        npm install -g pnpm@9.15.0
        pnpm --version

    - &pnpm_install
      name: Install dependencies
      script: |
        pnpm install --frozen-lockfile

    - &build_web
      name: Build @miraculturee/shared + @miraculturee/web
      script: |
        pnpm --filter @miraculturee/shared build
        pnpm --filter @miraculturee/web build

    - &sync_capacitor
      name: Copy web dist → iOS and cap sync
      script: |
        cd apps/ios
        rm -rf www
        cp -r ../web/dist www
        pnpm exec cap sync ios

    - &cocoapods_install
      name: Install CocoaPods dependencies
      script: |
        cd apps/ios/ios/App
        pod install --repo-update

  cache:
    - &pnpm_cache
      cache_paths:
        - $HOME/.pnpm-store
        - node_modules
        - apps/web/node_modules
        - apps/api/node_modules
        - apps/ios/node_modules
        - packages/shared/node_modules

    - &pods_cache
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.cocoapods
        - apps/ios/ios/App/Pods

workflows:
  # ---------------------------------------------------------------
  # iOS Release → TestFlight
  # ---------------------------------------------------------------
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 90
    instance_type: mac_mini_m2
    # Signing uses the team-level Codemagic integration named 'wavdrop'
    # (Key 22TM26BJ8D, Issuer 0c8293e2-..., Apple team GMQY9LD9C2).
    # The integration name is a handle; the same .p8 signs miraculturee,
    # wavdrop, and any other app under team GMQY9LD9C2. No per-app env
    # vars or fetch-signing-files script needed — Codemagic handles
    # keychain init, cert fetch/create, and profile setup automatically.
    integrations:
      app_store_connect: wavdrop
    environment:
      # Reference the app-level env var group that holds
      # CERTIFICATE_PRIVATE_KEY (uploaded earlier from mira_culture.p12).
      # Without this explicit groups declaration, Codemagic DOES NOT
      # inject variables from the ios_signing group into the build
      # environment — even though they're set on the miraculturee
      # Codemagic app. Build 69da36f9 failed at fetch-signing-files
      # with 'argument --certificate-key: Provided value "" is not
      # valid' because $CERTIFICATE_PRIVATE_KEY was empty.
      #
      # ios_signing: block still intentionally omitted — Codemagic's
      # pre-phase profile validator chokes on bundle IDs with no
      # profiles yet. Script-phase handles signing below.
      groups:
        - ios_signing
      vars:
        BUNDLE_ID: com.miraculturee.app
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6762042598"  # App Store Connect numeric ID for com.miraculturee.app
      node: 20.11.1
      xcode: latest
      cocoapods: default
    cache:
      <<: *pnpm_cache
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "ios-v*"
          include: true
    scripts:
      - *install_pnpm
      - *pnpm_install
      - *build_web
      - *sync_capacitor
      - name: Install CocoaPods dependencies
        script: |
          cd apps/ios/ios/App
          pod install --repo-update
      - name: Fetch or create signing files
        script: |
          set -e
          cd apps/ios/ios/App
          keychain initialize
          # NOTE: --certificate-key intentionally OMITTED.
          # The persistent CERTIFICATE_PRIVATE_KEY env var we uploaded
          # from mira_culture.p12 was being rejected by the CLI as
          # "not a valid value" — likely JSON newline encoding lost
          # the PEM line breaks during REST API upload. Letting
          # fetch-signing-files auto-generate a fresh RSA key each
          # build for now. Side effect: a new distribution cert is
          # created each run, so we'll hit Apple's 3-certs-per-team
          # limit every ~3 builds until I fix the stored key.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --platform IOS
          keychain add-certificates
          xcode-project use-profiles \
            --project App.xcodeproj \
            --warn-only \
            --verbose
          echo "=== project.pbxproj signing attributes AFTER use-profiles ==="
          grep -nE "PROVISIONING_PROFILE_SPECIFIER|CODE_SIGN_IDENTITY|CODE_SIGN_STYLE|DEVELOPMENT_TEAM" App.xcodeproj/project.pbxproj || echo "(no signing attrs found)"
          echo "=== Profiles on disk ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || echo "(no MobileDevice/Provisioning Profiles)"
          ls -la "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/" 2>/dev/null || echo "(no Xcode/UserData)"
          echo "=== Identities in codesigning keychain ==="
          security find-identity -v -p codesigning || true
      - name: Set build number
        script: |
          cd apps/ios/ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          agvtool new-version -all $(($LATEST + 1))
      - name: Build .ipa for App Store
        script: |
          cd apps/ios/ios/App
          # Raw xcodebuild archive with explicit signing flags.
          # `xcode-project build-ipa --workspace ... --config Release`
          # invokes xcodebuild internally but only passes CODE_SIGN_STYLE=Manual,
          # not DEVELOPMENT_TEAM or CODE_SIGN_IDENTITY — so Manual signing
          # fails with "requires a provisioning profile". Passing the
          # three flags + -allowProvisioningUpdates here matches the
          # pattern wavdrop's successful 3/29 build used.
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            DEVELOPMENT_TEAM=GMQY9LD9C2 \
            "CODE_SIGN_IDENTITY=Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates
          # Export the archive to an .ipa for TestFlight upload.
          # xcode-project build-ipa --archive auto-generates the
          # correct export_options.plist from use-profiles output.
          xcode-project build-ipa \
            --archive $CM_BUILD_DIR/build/App.xcarchive
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM.zip
    publishing:
      app_store_connect:
        # Integration-based auth — uses the same 'wavdrop' binding
        # declared above, no raw env vars needed.
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # ---------------------------------------------------------------
  # iOS Sideload — unsigned IPA, no ASC login required.
  # Produces a .ipa you can install on a physical iPhone via
  # Sideloadly / AltStore (which re-signs with your free Apple ID).
  # Mirrors the hehe-app "ios-sideload" workflow that's already
  # working in production.
  # ---------------------------------------------------------------
  ios-sideload:
    name: iOS Sideload (unsigned)
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: com.miraculturee.app
        XCODE_SCHEME: "App"
      node: 20.11.1
      xcode: latest
      cocoapods: default
    cache:
      <<: *pnpm_cache
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "ios/*"
          include: true
    scripts:
      - *install_pnpm
      - *pnpm_install
      - *build_web
      - *sync_capacitor
      - name: Install CocoaPods dependencies
        script: |
          # Capacitor 6 plugins still ship as CocoaPods pods, and the
          # project.pbxproj that `cap add ios` generated on Windows is
          # pure CocoaPods (6 [CP] script phases, 4 Pods_App framework
          # links, 0 SPM refs). We must `pod install` before xcodebuild
          # can find the Capacitor module.
          cd apps/ios/ios/App
          pod install --repo-update
      - name: Build unsigned archive
        script: |
          cd apps/ios/ios/App
          # Use .xcworkspace (not .xcodeproj) so xcodebuild can see
          # the Pods project that CocoaPods just generated.
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Export unsigned IPA for sideloading
        script: |
          cd $CM_BUILD_DIR/build/App.xcarchive/Products/Applications
          mkdir -p $CM_BUILD_DIR/build/ios/ipa
          mkdir Payload
          cp -r *.app Payload/
          zip -r $CM_BUILD_DIR/build/ios/ipa/miraculturee.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa

  # ---------------------------------------------------------------
  # Web-only smoke build — runs on every PR, no mac required.
  # Verifies the web build still succeeds and the dist can be
  # copied into the iOS wrapper. Catches breakages early.
  # ---------------------------------------------------------------
  web-build:
    name: Web Build (smoke)
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      groups:
        - miraculturee_env
      node: 20.11.1
    cache:
      <<: *pnpm_cache
    triggering:
      events:
        - pull_request
    scripts:
      - *install_pnpm
      - *pnpm_install
      - *build_web
      - name: Simulate iOS wrapper copy step
        script: |
          mkdir -p apps/ios/www
          cp -r apps/web/dist/* apps/ios/www/
          ls -lah apps/ios/www | head -20
    artifacts:
      - apps/web/dist/**
