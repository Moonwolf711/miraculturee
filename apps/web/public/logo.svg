<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180">
  <rect width="480" height="180" fill="#0a0a0a"/>

  <!-- Concert Poster Noir corner brackets -->
  <path d="M12,12 H32 M12,12 V32" stroke="#f59e0b" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M468,12 H448 M468,12 V32" stroke="#f59e0b" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M12,168 H32 M12,168 V148" stroke="#f59e0b" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M468,168 H448 M468,168 V148" stroke="#f59e0b" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Monogram: M with finger pointing up -->
  <g transform="translate(190, 10) scale(0.65)">
    <g fill="#f59e0b">
      <!-- M letterform -->
      <path d="M0,80 V14 L75,56 L150,14 V80 H126 V30 L75,62 L24,30 V80 Z"/>
      <!-- Finger rising from center valley -->
      <rect x="60" y="0" width="30" height="56" rx="15"/>
    </g>
  </g>

  <!-- Wordmark: MIRACULTURE -->
  <text x="240" y="114" text-anchor="middle" font-family="'Oswald', 'Bebas Neue', 'Impact', system-ui, sans-serif" font-weight="700" font-size="30" letter-spacing="12" fill="#f59e0b">MIRACULTURE</text>

  <!-- Divider line -->
  <line x1="155" y1="126" x2="325" y2="126" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>

  <!-- Tagline -->
  <text x="240" y="148" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', system-ui, sans-serif" font-weight="400" font-size="11" letter-spacing="5" fill="#9ca3af">WHERE FANS POWER THE SHOW</text>
</svg>
