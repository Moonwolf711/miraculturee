  <path d="M508,12 H488 M508,12 V32" stroke="#f59e0b" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M12,168 H32 M12,168 V148" stroke="#f59e0b" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M508,168 H488 M508,168 V148" stroke="#f59e0b" stroke-width="1" fill="none" opacity="0.3"/>

